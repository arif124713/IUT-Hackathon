  <text x="680" y="410" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="bold">Model Context Protocol</text>
  <text x="680" y="428" text-anchor="middle" fill="#a5f3fc" font-size="9">• get_office_status()</text>
  <text x="680" y="444" text-anchor="middle" fill="#a5f3fc" font-size="9">• get_room_status(room)</text>
  <text x="680" y="460" text-anchor="middle" fill="#a5f3fc" font-size="9">• get_power_usage()</text>
  <text x="680" y="476" text-anchor="middle" fill="#a5f3fc" font-size="9">• get_active_alerts()</text>
  <text x="680" y="492" text-anchor="middle" fill="#a5f3fc" font-size="9">• get_device_history(device_id)</text>
  <text x="680" y="514" text-anchor="middle" fill="#67e8f9" font-size="8">streamable-HTTP transport</text>
  <text x="680" y="530" text-anchor="middle" fill="#0891b2" font-size="8">mcp 1.28 (FastMCP)</text>
  <text x="680" y="544" text-anchor="middle" fill="#0e7490" font-size="8">python mcp_server/server.py</text>

