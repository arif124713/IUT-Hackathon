  <text x="920" y="414" text-anchor="middle" fill="#a78bfa" font-size="9">IUT_hackathon</text>
  <text x="920" y="430" text-anchor="middle" fill="#8b5cf6" font-size="8">discord.gg/x6T93a2J</text>
  <text x="920" y="448" text-anchor="middle" fill="#6d28d9" font-size="8">Gateway API  (wss://)</text>

