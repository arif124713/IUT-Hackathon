version: "3.9"

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  mcp_server:
    build: ./mcp_server
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8001:8001"
    depends_on:
      - backend

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      MCP_SERVER_URL: http://mcp_server:8001
    depends_on:
      - mcp_server

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
