  <line x1="266" y1="157" x2="296" y2="157" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-green)"/>
  <line x1="296" y1="175" x2="266" y2="175" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#a-blue)"/>

