  <text x="147" y="524" text-anchor="middle" fill="#6366f1" font-size="8">python bot/main.py</text>

  <!-- LangGraph Agent -->
  <rect x="292" y="370" width="228" height="168" rx="10" fill="#120d04" stroke="#f97316" stroke-width="1.5"/>
  <rect x="292" y="370" width="228" height="30" rx="10" fill="#2a1604"/>
  <rect x="292" y="388" width="228" height="12" fill="#2a1604"/>
  <text x="406" y="388" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold" letter-spacing="1">LANGGRAPH AGENT</text>
