  <text x="520" y="356" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" letter-spacing="2">💻  LOCAL MACHINE — Discord Bot + MCP Server</text>

  <!-- Discord Bot -->
  <rect x="38" y="370" width="218" height="168" rx="10" fill="#130a2a" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="38" y="370" width="218" height="30" rx="10" fill="#1e1145"/>
  <rect x="38" y="388" width="218" height="12" fill="#1e1145"/>
  <text x="147" y="388" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="bold" letter-spacing="1">DISCORD BOT</text>
  <text x="147" y="413" text-anchor="middle" fill="#c7d2fe" font-size="9">discord.py 2.4</text>
  <text x="147" y="431" text-anchor="middle" fill="#e0e7ff" font-size="9">• !status  !room  !usage</text>
  <text x="147" y="447" text-anchor="middle" fill="#e0e7ff" font-size="9">• !alerts  !help</text>
