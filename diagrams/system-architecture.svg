  <text x="208" y="613" text-anchor="middle" fill="#86efac" font-size="9">5 × ZMCT103C CT sensors per room</text>
  <text x="208" y="629" text-anchor="middle" fill="#86efac" font-size="9">ADC1 only: GPIO 32–36  (avoids Wi-Fi conflict)</text>
  <text x="208" y="645" text-anchor="middle" fill="#86efac" font-size="9">Wi-Fi → HTTP POST /ingest → FastAPI</text>
  <text x="208" y="661" text-anchor="middle" fill="#22c55e" font-size="8">Wokwi sim: potentiometers + LEDs stand in for CTs</text>
  <text x="208" y="673" text-anchor="middle" fill="#15803d" font-size="8" font-style="italic">[ future hardware integration ]</text>

