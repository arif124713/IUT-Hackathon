  <text x="406" y="431" text-anchor="middle" fill="#fff7ed" font-size="9">• DeepSeek LLM</text>
  <text x="406" y="447" text-anchor="middle" fill="#fff7ed" font-size="9">• deepseek-chat model</text>
  <text x="406" y="463" text-anchor="middle" fill="#fff7ed" font-size="9">• 30 s agent timeout</text>
  <text x="406" y="479" text-anchor="middle" fill="#fff7ed" font-size="9">• TTL cache (5 s)</text>
  <text x="406" y="495" text-anchor="middle" fill="#fff7ed" font-size="9">• Off-topic refusal guard</text>
  <text x="406" y="524" text-anchor="middle" fill="#ea580c" font-size="8">langgraph 0.2.60  ·  langchain-mcp-adapters</text>

