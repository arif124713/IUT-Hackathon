  <text x="661" y="123" text-anchor="middle" fill="#d8b4fe" font-size="9">SQLite (HF)  ·  MySQL (local)</text>
  <text x="661" y="141" text-anchor="middle" fill="#ede9fe" font-size="9">• devices  (15 rows)</text>
  <text x="661" y="157" text-anchor="middle" fill="#ede9fe" font-size="9">• state_events</text>
  <text x="661" y="173" text-anchor="middle" fill="#ede9fe" font-size="9">• alerts</text>
  <text x="661" y="206" text-anchor="middle" fill="#7c3aed" font-size="8">aiosqlite  ·  async engine</text>

