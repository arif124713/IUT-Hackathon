<svg viewBox="0 0 1040 780" width="1040" height="780" xmlns="http://www.w3.org/2000/svg" style="background:#0a0e17">
  <defs>
    <marker id="a-green" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#22c55e"/></marker>
    <marker id="a-cyan" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#00d4ff"/></marker>
    <marker id="a-orange" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#f97316"/></marker>
    <marker id="a-purple" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#a855f7"/></marker>
    <marker id="a-indigo" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#818cf8"/></marker>
    <marker id="a-red" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#f87171"/></marker>
    <marker id="a-emerald" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#34d399"/></marker>
    <marker id="a-blue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#60a5fa"/></marker>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>text { font-family: 'Courier New', Courier, monospace; }</style>

  <!-- Title -->
  <text x="520" y="20" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold" font-family="system-ui, sans-serif">⚡ OfficePulse — System Architecture</text>

  <!-- CLOUD REGION -->
  <rect x="18" y="28" width="1004" height="268" rx="14" fill="#0c1a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="520" y="54" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" letter-spacing="2">☁  HUGGING FACE SPACES — arif124713-officepulse.hf.space</text>

  <!-- nginx/React box -->
  <rect x="38" y="65" width="228" height="212" rx="10" fill="#0f1f2a" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="38" y="65" width="228" height="30" rx="10" fill="#0c3347"/>
  <rect x="38" y="83" width="228" height="12" fill="#0c3347"/>
  <text x="152" y="85" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="bold" letter-spacing="1">NGINX  :7860</text>
  <text x="152" y="110" text-anchor="middle" fill="#93c5fd" font-size="10">React Frontend (Vite 6)</text>
  <text x="152" y="128" text-anchor="middle" fill="#bfdbfe" font-size="9">• Power gauge + room bars</text>
  <text x="152" y="144" text-anchor="middle" fill="#bfdbfe" font-size="9">• Animated SVG floor plan</text>
  <text x="152" y="160" text-anchor="middle" fill="#bfdbfe" font-size="9">• 30-pt Recharts trend line</text>
  <text x="152" y="176" text-anchor="middle" fill="#bfdbfe" font-size="9">• Alerts panel</text>
  <text x="152" y="192" text-anchor="middle" fill="#bfdbfe" font-size="9">• Live Dhaka clock</text>
  <text x="152" y="212" text-anchor="middle" fill="#64748b" font-size="8">proxies /api/ /ws/ /mcp</text>
  <text x="152" y="228" text-anchor="middle" fill="#475569" font-size="8">React 18 + CSS animations</text>
  <text x="152" y="262" text-anchor="middle" fill="#38bdf8" font-size="8">WebSocket  ·  REST</text>

  <!-- FastAPI box -->
  <rect x="296" y="65" width="238" height="212" rx="10" fill="#0a1f12" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="296" y="65" width="238" height="30" rx="10" fill="#0d2e18"/>
  <rect x="296" y="83" width="238" height="12" fill="#0d2e18"/>
  <text x="415" y="85" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold" letter-spacing="1">FASTAPI BACKEND  :8000</text>
  <text x="415" y="110" text-anchor="middle" fill="#86efac" font-size="10">Python 3.11 + SQLAlchemy async</text>
  <text x="415" y="128" text-anchor="middle" fill="#bbf7d0" font-size="9">• REST API  (7 routes)</text>
  <text x="415" y="144" text-anchor="middle" fill="#bbf7d0" font-size="9">• WebSocket  /ws/live</text>
  <text x="415" y="160" text-anchor="middle" fill="#bbf7d0" font-size="9">• Markov device simulator</text>
  <text x="415" y="176" text-anchor="middle" fill="#bbf7d0" font-size="9">• Alerts engine (30s eval)</text>
  <text x="415" y="192" text-anchor="middle" fill="#bbf7d0" font-size="9">• kWh integrator</text>
  <text x="415" y="212" text-anchor="middle" fill="#86efac" font-size="9">• asyncio.Queue WS fan-out</text>
  <text x="415" y="262" text-anchor="middle" fill="#4ade80" font-size="8">SQLAlchemy  ·  aiosqlite</text>

  <!-- SQLite box -->
  <rect x="572" y="80" width="178" height="140" rx="10" fill="#130a2a" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="572" y="80" width="178" height="30" rx="10" fill="#1e0f3d"/>
  <rect x="572" y="98" width="178" height="12" fill="#1e0f3d"/>
