  <text x="920" y="526" text-anchor="middle" fill="#f87171" font-size="9">deepseek-chat</text>
  <text x="920" y="544" text-anchor="middle" fill="#ef4444" font-size="8">OpenAI-compat endpoint</text>
  <text x="920" y="558" text-anchor="middle" fill="#b91c1c" font-size="8">api.deepseek.com</text>

  <!-- ESP32 future -->
